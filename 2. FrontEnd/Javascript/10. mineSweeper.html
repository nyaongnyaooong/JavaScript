<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineSweeper</title>
    
    <style>
        table { border-collapse: collapse; }
        td {
            border: 1px solid #bbb;
            text-align: center;
            line-height: 20px;
            width: 20px;
            height: 20px;
            background: #888;
        }
        td.opened { background: white; }
        td.flag { background: red; }
        td.question { background: orange; }
    </style>
</head>
<body>
    <form id="form">
        <input placeholder="가로 줄" id="row" size="5" />
        <input placeholder="세로 줄" id="cell" size="5" />
        <input placeholder="지뢰" id="mine" size="5" />
        <button>생성</button>
    </form>

    <div id="timer">0초</div>

    <table id="table">
    <tbody></tbody>
    </table>

    <div id="result"></div>

    <script>
        const $tbody = document.querySelector('#table tbody');
        const $result = document.querySelector('#result');

        const row = 10;
        const cell = 10;
        const mine = 10;
        const code = {
            normal: -1,
            question: -2,
            flag: -3,
            question_mine: -4,
            flag_mine: -5,
            mine : -6,
            opened : 0,
        };


        function drawTable(row, column) {
            //row x column table 생성, 해당 document element 값을 array형태로 return
            //const table = new Array(row).fill([]);
            const arrTr = [];
            const table = Array(10).fill(Array(0));
            //console.log(table[0]);
            for (let i = 0; i < row; i++) {
                const arrTd = [];
                //console.log(arrTd);
                const $tr = document.createElement('tr');
                for (let j = 0; j < column; j++) {
                    const $td = document.createElement('td');

                    $td.addEventListener('dragstart drop', (event) => {
                        event.preventDefault();
                    });
                    $td.addEventListener('click', clickedLeft);
                    $td.addEventListener('contextmenu', clickedRight);
                    
                    arrTd.push($td);
                    $tr.append($td);
                    table[i].push($td);
                }
                //table[i].push(arrTd);
                arrTr.push(arrTd);
                $tbody.append($tr);
            }
            return arrTr;
        }


        function setTable(row, column) {

            //0으로 채운 1차열 배열
            const arrInfo = new Array(row * column).fill(0);
            //0 ~ n으로 채운 1차열 길이 n의 배열
            const candidate = new Array(row * column).fill().map((element, index) => {
                return index;
            });

            //랜덤으로 지뢰설정
            for(let i = 0; i < 10; i++) {
                const randomIndex = Math.floor(Math.random() * candidate.length);
                const splicedArray = candidate.splice(randomIndex, 1);
                arrInfo[splicedArray[0]] = code.mine;
            }

            //1->2차원 배열 변환
            const arrTable = new Array(row).fill().map((element, index) => {
                const arrayColumn = [];
                for(let i = index * column; i < (index + 1) * column; i++) {
                    arrayColumn.push(arrInfo[i]);
                }
                return arrayColumn;
            });

            //지뢰 주변에 숫자추가
            
            for (let i = 0; i < row; i++) {
                for (let j = 0; j < column; j++) {
                    if (arrTable[i][j] === code.mine) {
                        setMineNumber(arrTable, i, j, row, column);
                    }
                }
            }
            
            return arrTable;
        }


        function setMineNumber(array, index1, index2, row, column) {

            //좌상
            if(index1 - 1 > -1 && index2 - 1 > -1 && array[index1 - 1][index2 - 1] !== code.mine) {
                array[index1 - 1][index2 - 1]++; 
            }
            //상
            if(index1 - 1 > -1 && array[index1 - 1][index2] !== code.mine) {
                array[index1 - 1][index2]++; 
            }
            //우상
            if(index1 - 1 > -1 && index2 + 1 < column && array[index1 - 1][index2 + 1] !== code.mine) {
                array[index1 - 1][index2 + 1]++; 
            }
            //좌
            if(index2 - 1 > -1 && array[index1][index2 - 1] !== code.mine) {
                array[index1][index2 - 1]++; 
            }
            //우
            if(index2 + 1 < column && array[index1][index2 + 1] !== code.mine) {
                array[index1][index2 + 1]++; 
            }
            //좌하
            if(index1 + 1 < row && index2 - 1 > -1 && array[index1 + 1][index2 - 1] !== code.mine) {
                array[index1 + 1][index2 - 1]++; 
            }
            //하
            if(index1 + 1 < row && array[index1 + 1][index2] !== code.mine) {
                array[index1 + 1][index2]++; 
            }
            //우하
            if(index1 + 1 < row && index2 + 1 < column && array[index1 + 1][index2 + 1] !== code.mine) {
                array[index1 + 1][index2 + 1]++; 
            }
        }

        function clickedLeft(event) {
            if (event.target.classList.contains('opened')) {
                return;
            }
            
            event.target.classList.add('opened')
            event.target.classList.remove('flag')

        }

        function clickedRight(event) {
            event.preventDefault();
            event.target.classList.add('flag');
            console.log(event.target.className);
            if (event.target.classList.contains('flag')) {
                alert('1');
            }
        }

        const table = {
            info: setTable(row, cell),
            html: drawTable(row, cell),
        }

        for (let i = 0; i < row; i++) {
            for(let j = 0; j < cell; j++) {
                //console.log()
                if (table.info[i][j] != 0)
                    table.html[i][j].innerHTML = table.info[i][j];
            }
        }


    </script>
</body>
</html>
