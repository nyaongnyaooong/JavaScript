        let totalInterest;
        let totalInput = 0;
        const interest = [];
        let rate = 7;
        rate = rate / 100;
        for(i=1; i<27; i++) {
            let j = i * 10000;
            totalInput += j;
            interest.push(Math.round(j * rate * ((27 - i) * 7 - 1) / 365));
        }
        
        totalInterest = interest.reduce((a, c) => a + c);
        console.log(totalInput);
        console.log(totalInterest);
        console.log(totalInterest*0.846);
