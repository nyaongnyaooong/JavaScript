<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Response check</title>
    <style>
        #screen {
            width : 300px;
            height : 200px;
            text-align: center;
            user-select: none;
        }

        #screen.waiting {
            background-color: aqua;
        }

        #screen.ready {
            background-color: red;
            color: white;
        }

        #screen.now {
            background-color: green;
        }
    </style>
</head>
<body>
    <div id="screen" class="waiting">클릭해서 시작하세요</div>
    <div id="result"></div>
    <script>
        const $screen = document.querySelector('#screen');
        const $result = document.querySelector('#result');
        let waitTimer;

        $screen.addEventListener('click', (event) => {
            if (event.target.classList.contains('waiting')) {
                event.target.classList.replace('waiting', 'ready')
                event.target.textContent = '초록색이 되면 클릭하세요';
                
                const waitTime = Math.random() * 3000 + 2000;
                waitTimer = setTimeout(() => {
                    event.target.classList.replace('ready', 'now')
                    event.target.textContent = '지금입니다!';
                }, waitTime);
            }
            else if (event.target.classList.contains('ready')) {
                clearTimeout(waitTimer);
                event.target.classList.replace('ready', 'waiting')
                event.target.textContent = '성급하시군요';
            }
            else if (event.target.classList.contains('now')) {

            }
        });

    </script>
</body>
</html>
