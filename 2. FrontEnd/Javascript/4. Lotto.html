<body>
    <div id="result">추첨 결과는?</div>
    <div id="bonus">보너스 : </div>

    <script>
        let number = Array(45).fill().map((element, index) => index + 1);
        let shuffle = [];
        //피셔 예이츠 셔플 (전체 숫자 셔플)
        while(number.length > 0) {
            let random = Math.floor(Math.random() * number.length);
            shuffle.push(number.splice(random, 1)[0]);
        }
        //console.log(shuffle);

        let num7 = shuffle.slice(0, 6).sort((a, b) => a - b);
        let bonus = shuffle[6];
        console.log(num7, bonus);



    </script>
